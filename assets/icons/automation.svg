<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- PLC body -->
  <rect x="8" y="20" width="48" height="32" rx="4" fill="#0a2540" stroke="#00d4ff" stroke-width="1.5"/>
  <!-- Status LEDs -->
  <circle cx="16" cy="28" r="3" fill="#ff7a2d" stroke="#041022" stroke-width="0.5"/>
  <circle cx="16" cy="36" r="3" fill="#68f0ff" stroke="#041022" stroke-width="0.5"/>
  <circle cx="16" cy="44" r="3" fill="#00d4ff" stroke="#041022" stroke-width="0.5"/>
  <!-- Buttons -->
  <rect x="28" y="28" width="8" height="4" rx="1" fill="#ff7a2d" stroke="#041022" stroke-width="0.5"/>
  <rect x="40" y="28" width="8" height="4" rx="1" fill="#ff7a2d" stroke="#041022" stroke-width="0.5"/>
  <rect x="28" y="36" width="8" height="4" rx="1" fill="#ff7a2d" stroke="#041022" stroke-width="0.5"/>
  <rect x="40" y="36" width="8" height="4" rx="1" fill="#ff7a2d" stroke="#041022" stroke-width="0.5"/>
  <!-- Screen display -->
  <rect x="24" y="44" width="16" height="6" rx="2" fill="#041022" stroke="#00d4ff" stroke-width="0.5"/>
  <text x="32" y="48" font-family="Arial" font-size="3" fill="#00d4ff" text-anchor="middle" dominant-baseline="middle">PLC</text>
  <!-- Connection ports -->
  <rect x="8" y="30" width="4" height="2" rx="0.5" fill="#68f0ff"/>
  <rect x="8" y="38" width="4" height="2" rx="0.5" fill="#68f0ff"/>
  <rect x="52" y="30" width="4" height="2" rx="0.5" fill="#68f0ff"/>
  <rect x="52" y="38" width="4" height="2" rx="0.5" fill="#68f0ff"/>
</svg>