<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" role="img" aria-label="Wecon logo">
  <!-- White background -->
  <rect width="1200" height="400" fill="#ffffff"/>
  <!-- Black vertical bar -->
  <rect x="40" y="80" width="50" height="240" fill="#1a1a1a" rx="8"/>
  <!-- Teal slash -->
  <rect x="115" y="60" width="45" height="280" fill="#1b9b9b" rx="8" transform="rotate(-25 137.5 200)"/>
  <!-- Teal diagonal -->
  <rect x="180" y="100" width="40" height="200" fill="#1b9b9b" rx="8" transform="rotate(25 200 200)"/>
  <!-- WECON text -->
  <text x="300" y="260" font-family="Arial, sans-serif" font-size="180" font-weight="900" fill="#1a1a1a" letter-spacing="8">WECON</text>
</svg>
