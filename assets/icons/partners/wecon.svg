<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" role="img" aria-label="Wecon logo">
  <!-- White background -->
  <rect width="1200" height="400" fill="#ffffff"/>
  
  <!-- Black vertical bar -->
  <rect x="35" y="95" width="35" height="210" fill="#1a1a1a" rx="6"/>
  
  <!-- Dark teal left diagonal -->
  <g transform="translate(95, 130)">
    <rect x="0" y="0" width="30" height="160" fill="#0d6b6b" rx="5" transform="rotate(-35 15 80)"/>
  </g>
  
  <!-- Light teal right diagonal -->
  <g transform="translate(140, 110)">
    <rect x="0" y="0" width="28" height="180" fill="#1b9b9b" rx="5" transform="rotate(35 14 90)"/>
  </g>
  
  <!-- WECON text -->
  <text x="280" y="285" font-family="'Arial Black', 'Helvetica Bold', sans-serif" font-size="200" font-weight="900" fill="#1a1a1a" letter-spacing="12" font-stretch="condensed">WECON</text>
</svg>
